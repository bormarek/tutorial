name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'          # uruchamia się też przy tagach, np. v1.2.3
  pull_request:
    branches:
      - main              # tylko build (bez push) dla PR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobierz kod
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Wyciągnij metadane (nazwa obrazu, tagi)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/my-app
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      # 3. Zaloguj się do Docker Hub
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Ustaw buildx (multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Zbuduj i wypchnij obraz
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # cache z GitHub Actions
          cache-to: type=gha,mode=max # zapisz cache dla następnych buildów
